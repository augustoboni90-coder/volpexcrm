<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Volpex CRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f172a;
      --surface: #020617;
      --card: #020617;
      --accent: #f97316;
      --accent-soft: rgba(249, 115, 22, 0.12);
      --text: #e5e7eb;
      --muted: #6b7280;
      --danger: #ef4444;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    #app {
      width: 100%;
      max-width: 1200px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 24px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow:
        0 40px 80px rgba(15, 23, 42, 0.75),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      overflow: hidden;
      backdrop-filter: blur(16px);
    }
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 640px;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid rgba(148,163,184,0.35); }
    }
    .sidebar {
      padding: 20px 18px;
      border-right: 1px solid rgba(148,163,184,0.35);
      background: radial-gradient(circle at top left, rgba(249,115,22,0.12), transparent 55%);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
    }
    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: radial-gradient(circle at 30% 20%, #f97316, #ea580c);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(248, 250, 252, 0.12),
        0 10px 25px rgba(249,115,22,0.55);
      font-size: 20px;
    }
    .logo-text-main {
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
    }
    .logo-text-sub {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }
    .nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 18px;
    }
    .nav-btn {
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      padding: 7px 11px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease, transform 0.08s ease;
    }
    .nav-btn span.icon {
      font-size: 16px;
      width: 18px;
      text-align: center;
    }
    .nav-btn.active {
      background: radial-gradient(circle at top left, rgba(249,115,22,0.22), rgba(15,23,42,0.95));
      border-color: rgba(248, 250, 252, 0.14);
      color: #e5e7eb;
      transform: translateX(1px);
    }
    .nav-btn:hover:not(.active) {
      background: rgba(15, 23, 42, 0.9);
      border-color: rgba(148,163,184,0.4);
      color: #e5e7eb;
    }
    .nav-label { font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.13em; margin: 14px 0 8px; }
    .sync-badge {
      margin-top: 16px;
      padding: 9px 11px;
      border-radius: 12px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: radial-gradient(circle at top left, rgba(34,197,94,0.12), rgba(15,23,42,0.9));
      border: 1px solid rgba(22,163,74,0.55);
      color: #bbf7d0;
    }
    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34,197,94,0.35);
    }
    .main {
      padding: 18px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .headline {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .headline span.sub {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }
    .pill {
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      font-size: 11px;
      color: var(--muted);
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }
    .badge-accent {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      background: rgba(249,115,22,0.14);
      color: #fed7aa;
      border: 1px solid rgba(249,115,22,0.45);
    }
    .btn {
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      border: 1px solid transparent;
      background: rgba(15,23,42,0.85);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.08s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }
    .btn-primary {
      background: radial-gradient(circle at 30% 0, #fed7aa, #f97316);
      color: #020617;
      font-weight: 600;
      box-shadow:
        0 10px 28px rgba(249,115,22,0.55),
        0 0 0 1px rgba(15,23,42,0.9);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow:
        0 18px 40px rgba(249,115,22,0.7),
        0 0 0 1px rgba(15,23,42,0.9);
    }
    .btn-ghost {
      border-color: rgba(148,163,184,0.6);
    }
    .btn-ghost:hover {
      background: rgba(15,23,42,0.9);
      border-color: rgba(148,163,184,0.9);
    }
    .search-input {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.4);
      background: rgba(15,23,42,0.9);
      padding: 8px 11px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .search-input::placeholder { color: rgba(148,163,184,0.9); }
    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 6px;
    }
    .cards {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.2fr);
      gap: 12px;
      margin-top: 6px;
    }
    @media (max-width: 900px) {
      .cards { grid-template-columns: 1fr; }
    }
    .panel {
      background: rgba(15, 23, 42, 0.95);
      border-radius: var(--radius);
      padding: 12px 12px 10px;
      border: 1px solid rgba(30,64,175,0.45);
      box-shadow:
        0 12px 28px rgba(15,23,42,0.85),
        inset 0 0 0 1px rgba(15,23,42,0.9);
    }
    .panel h2 {
      margin: 0 0 4px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
    }
    .panel-sub {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .table th, .table td {
      padding: 6px 4px;
      border-bottom: 1px solid rgba(31,41,55,0.9);
    }
    .table th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-align: left;
    }
    .table tr:last-child td { border-bottom: none; }
    .chip {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border: 1px solid rgba(148,163,184,0.45);
      color: var(--muted);
    }
    .chip-brand {
      border-color: rgba(248,250,252,0.28);
      color: #e5e7eb;
      background: rgba(15,23,42,0.9);
    }
    .muted { color: var(--muted); }
    .tag-type {
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border: 1px solid rgba(148,163,184,0.55);
    }
    .tag-mobile { border-color: rgba(34,197,94,0.7); color: #bbf7d0; }
    .tag-fisso { border-color: rgba(59,130,246,0.7); color: #bfdbfe; }
    .tag-luce  { border-color: rgba(234,179,8,0.7); color: #facc15; }
    .tag-gas   { border-color: rgba(248,113,113,0.8); color: #fecaca; }
    .tag-tv    { border-color: rgba(168,85,247,0.8); color: #e9d5ff; }
    .pill-sm {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      border: 1px solid rgba(148,163,184,0.5);
      color: var(--muted);
    }
    .pill-sm-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(248,250,252,0.7);
    }
    .empty {
      padding: 12px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      border-radius: 12px;
      background: radial-gradient(circle at top, rgba(15,23,42,0.95), rgba(15,23,42,0.98));
      border: 1px dashed rgba(55,65,81,0.9);
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(15,23,42,0.88), rgba(0,0,0,0.96));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 40;
    }
    .modal {
      width: 100%;
      max-width: 560px;
      background: rgba(15,23,42,0.98);
      border-radius: 20px;
      border: 1px solid rgba(148,163,184,0.6);
      box-shadow: 0 36px 80px rgba(0,0,0,0.9);
      padding: 16px 16px 12px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .modal-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .modal-title span.sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.16em; }
    .modal-close {
      border-radius: 999px;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(15,23,42,0.9);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .form-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; }
    .field label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    .field input, .field select {
      border-radius: 10px;
      border: 1px solid rgba(55,65,81,0.9);
      padding: 6px 8px;
      background: rgba(15,23,42,0.95);
      color: var(--text);
      font-size: 12px;
      outline: none;
    }
    .field input::placeholder { color: rgba(75,85,99,0.9); }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }
    .toast {
      position: fixed;
      right: 14px;
      bottom: 14px;
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 12px;
      background: radial-gradient(circle at top left, #22c55e, #15803d);
      color: #ecfdf5;
      box-shadow: 0 14px 32px rgba(22,163,74,0.7);
      z-index: 50;
    }
    .toast.error {
      background: radial-gradient(circle at top left, #ef4444, #991b1b);
      box-shadow: 0 14px 32px rgba(220,38,38,0.7);
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxtaqy6Yv3fKlQB3nMrhEd0GdGAzAYzrF5VoRFzgrtRgK7nqvaxoCLF479YJtupn089/exec';

const State = {
  data: { customers: [], contracts: [], devices: [] },
  ui: {
    tab: 'clients',
    search: '',
    modal: null, // 'client' | 'contract' | 'device'
    editing: null,
    syncing: false
  },

  async init() {
    try {
      const res = await fetch(API_URL + '?type=all');
      if (!res.ok) throw new Error('http');
      const json = await res.json();
      this.data = json;
      localStorage.setItem('volpex_state', JSON.stringify(this.data));
    } catch (e) {
      console.warn('Errore fetch remoto, uso cache locale', e);
      const raw = localStorage.getItem('volpex_state');
      if (raw) this.data = JSON.parse(raw);
    }
  },

  async save() {
    this.ui.syncing = true;
    render();
    try {
      await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(this.data)
      });
      localStorage.setItem('volpex_state', JSON.stringify(this.data));
      showToast('Sincronizzato con Volpex Cloud');
    } catch (e) {
      console.warn('Errore salvataggio remoto', e);
      showToast('Errore salvataggio remoto', 'error');
    } finally {
      this.ui.syncing = false;
      render();
    }
  },

  upsertCustomer(payload) {
    const list = [...this.data.customers];
    if (this.ui.editing) {
      const idx = list.findIndex(c => c.id === this.ui.editing.id);
      if (idx !== -1) list[idx] = { ...list[idx], ...payload };
    } else {
      list.unshift({
        id: 'c_' + Date.now(),
        ...payload
      });
    }
    this.data.customers = list;
    this.ui.modal = null;
    this.ui.editing = null;
    this.save();
  },

  removeCustomer(id) {
    this.data.customers = this.data.customers.filter(c => c.id !== id);
    this.save();
  },

  upsertContract(payload) {
    const list = [...this.data.contracts];
    if (this.ui.editing) {
      const idx = list.findIndex(c => c.id === this.ui.editing.id);
      if (idx !== -1) list[idx] = { ...list[idx], ...payload };
    } else {
      list.unshift({
        id: 'ctr_' + Date.now(),
        ...payload
      });
    }
    this.data.contracts = list;
    this.ui.modal = null;
    this.ui.editing = null;
    this.save();
  },

  removeContract(id) {
    this.data.contracts = this.data.contracts.filter(c => c.id !== id);
    this.save();
  },

  upsertDevice(payload) {
    const list = [...this.data.devices];
    if (this.ui.editing) {
      const idx = list.findIndex(d => d.id === this.ui.editing.id);
      if (idx !== -1) list[idx] = { ...list[idx], ...payload };
    } else {
      list.unshift({
        id: 'dev_' + Date.now(),
        ...payload
      });
    }
    this.data.devices = list;
    this.ui.modal = null;
    this.ui.editing = null;
    this.save();
  },

  removeDevice(id) {
    this.data.devices = this.data.devices.filter(d => d.id !== id);
    this.save();
  }
};

let toastTimeout = null;
function showToast(msg, type = 'success') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'toast' + (type === 'error' ? ' error' : '');
  div.textContent = msg;
  document.body.appendChild(div);
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => div.remove(), 2800);
}

function esc(str) {
  return (str ?? '').toString().replace(/[&<>"]/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;'
  }[c]));
}

function render() {
  const root = document.getElementById('app');
  const { tab, search, modal, editing, syncing } = State.ui;
  const { customers, contracts, devices } = State.data;

  const q = search.trim().toLowerCase();
  const filteredCustomers = !q ? customers : customers.filter(c =>
    (c.nome || '').toLowerCase().includes(q) ||
    (c.cognome || '').toLowerCase().includes(q) ||
    (c.codice_fiscale || '').toLowerCase().includes(q)
  );

  const filteredContracts = !q ? contracts : contracts.filter(c =>
    (c.codice_fiscale || '').toLowerCase().includes(q) ||
    (c.compagnia || '').toLowerCase().includes(q) ||
    (c.offerta || '').toLowerCase().includes(q) ||
    (c.numero || '').toLowerCase().includes(q)
  );

  const filteredDevices = !q ? devices : devices.filter(d =>
    (d.codice_fiscale || '').toLowerCase().includes(q) ||
    (d.marca || '').toLowerCase().includes(q) ||
    (d.modello || '').toLowerCase().includes(q) ||
    (d.imei || '').toLowerCase().includes(q)
  );

  root.innerHTML = `
    <div class="layout">
      <aside class="sidebar">
        <div class="logo">
          <div class="logo-mark">🦊</div>
          <div>
            <div class="logo-text-main">VOLPEX CRM</div>
            <div class="logo-text-sub">Customer Radar</div>
          </div>
        </div>

        <div class="nav-label">Vista</div>
        <div class="nav">
          <button class="nav-btn ${tab === 'clients' ? 'active' : ''}" data-tab="clients">
            <span class="icon">👥</span>
            <span>Clienti</span>
          </button>
          <button class="nav-btn ${tab === 'contracts' ? 'active' : ''}" data-tab="contracts">
            <span class="icon">📄</span>
            <span>Contratti</span>
          </button>
          <button class="nav-btn ${tab === 'devices' ? 'active' : ''}" data-tab="devices">
            <span class="icon">📱</span>
            <span>Device</span>
          </button>
        </div>

        <div class="nav-label">Azioni</div>
        <div class="nav">
          <button class="nav-btn" data-action="new-client">
            <span class="icon">➕</span>
            <span>Nuovo cliente</span>
          </button>
          <button class="nav-btn" data-action="new-contract">
            <span class="icon">⚡</span>
            <span>Nuovo contratto</span>
          </button>
          <button class="nav-btn" data-action="new-device">
            <span class="icon">📦</span>
            <span>Aggiungi device</span>
          </button>
        </div>

        <div class="sync-badge">
          <div class="sync-dot" style="opacity:${syncing ? 1 : 0.4}"></div>
          <div style="display:flex;flex-direction:column;gap:2px;">
            <span style="font-size:11px;">Volpex Cloud Sync</span>
            <span style="font-size:10px;color:var(--muted);">
              ${syncing ? 'Sincronizzazione in corso…' : 'Stato: allineato'}
            </span>
          </div>
        </div>
      </aside>

      <main class="main">
        <div class="top-bar">
          <div class="headline">
            <span>${tab === 'clients' ? 'Clienti' : tab === 'contracts' ? 'Contratti' : 'Device'}</span>
            <span class="sub">Volpex overview</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="badge-accent">
              Cloud Sheet • Live
            </span>
          </div>
        </div>

        <div class="search-row">
          <input class="search-input" placeholder="Cerca per nome, CF, numero…" value="${esc(search)}" />
          <button class="btn btn-ghost" data-action="clear-search">
            ✕
          </button>
        </div>

        <div class="cards">
          <section class="panel">
            <h2>${tab === 'clients' ? 'Elenco clienti' : tab === 'contracts' ? 'Elenco contratti' : 'Elenco device'}</h2>
            <div class="panel-sub">
              ${tab === 'clients'
                ? `${customers.length} clienti in anagrafica`
                : tab === 'contracts'
                  ? `${contracts.length} contratti totali`
                  : `${devices.length} device registrati`}
            </div>

            ${tab === 'clients'
              ? renderClientsTable(filteredCustomers)
              : tab === 'contracts'
                ? renderContractsTable(filteredContracts)
                : renderDevicesTable(filteredDevices)}
          </section>

          <section class="panel">
            <h2>Insight veloci</h2>
            <div class="panel-sub">
              Snapshot sintetico del portafoglio Volpex.
            </div>
            ${renderInsightBlock()}
          </section>
        </div>
      </main>
    </div>

    ${modal ? renderModal(modal, editing) : ''}
  `;

  bindEvents();
}

function renderClientsTable(list) {
  if (!list.length) {
    return `<div class="empty">Nessun cliente ancora registrato. Aggiungine uno dal menu a sinistra.</div>`;
  }
  return `
    <table class="table">
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Codice fiscale</th>
          <th>Contatto</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${list.map(c => `
          <tr>
            <td>
              <div style="font-size:12px;">${esc(c.nome)} ${esc(c.cognome)}</div>
              <div class="muted" style="font-size:11px;">${esc(c.residenza || '')}</div>
            </td>
            <td><span class="chip">${esc(c.codice_fiscale || '')}</span></td>
            <td>
              <div style="font-size:12px;">${esc(c.telefono || '')}</div>
              <div class="muted" style="font-size:11px;">${esc(c.email || '')}</div>
            </td>
            <td style="text-align:right;">
              <button class="btn btn-ghost" data-action="edit-client" data-id="${esc(c.id)}">Modifica</button>
              <button class="btn btn-ghost" style="border-color:rgba(239,68,68,0.7);color:#fecaca;" data-action="delete-client" data-id="${esc(c.id)}">Elimina</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderContractsTable(list) {
  if (!list.length) {
    return `<div class="empty">Ancora nessun contratto. Registra il primo dal menu a sinistra.</div>`;
  }
  return `
    <table class="table">
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Offerta</th>
          <th>Tipo</th>
          <th>€ / mese</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${list.map(c => `
          <tr>
            <td>
              <div style="font-size:12px;">${esc(c.codice_fiscale || '')}</div>
              <div class="muted" style="font-size:11px;">${esc(c.compagnia || '')}</div>
            </td>
            <td>
              <span class="chip chip-brand">${esc(c.offerta || '')}</span>
              <div class="muted" style="font-size:11px;">${esc(c.numero || '')}</div>
            </td>
            <td>${renderTypeTag(c.tipo)}</td>
            <td><strong>${esc(c.costo_mensile || '')}</strong></td>
            <td style="text-align:right;">
              <button class="btn btn-ghost" data-action="edit-contract" data-id="${esc(c.id)}">Modifica</button>
              <button class="btn btn-ghost" style="border-color:rgba(239,68,68,0.7);color:#fecaca;" data-action="delete-contract" data-id="${esc(c.id)}">Elimina</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>

}

function renderDevicesTable(list) {
  if (!list.length) {
    return `<div class="empty">Nessun device registrato. Puoi associarne uno a un cliente.</div>`;
  }
  return `
    <table class="table">
      <thead>
        <tr>
          <th>Cliente / CF</th>
          <th>Device</th>
          <th>IMEI</th>
          <th>Met.</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${list.map(d => `
          <tr>
            <td>
              <div style="font-size:12px;">${esc(d.codice_fiscale || '')}</div>
              <div class="muted" style="font-size:11px;">${esc(d.note || '')}</div>
            </td>
            <td>
              <div style="font-size:12px;">${esc(d.marca || '')} ${esc(d.modello || '')}</div>
            </td>
            <td><span class="chip">${esc(d.imei || '')}</span></td>
            <td><span class="pill-sm"><span class="pill-sm-dot"></span>${esc(d.metodo || '')}</span></td>
            <td style="text-align:right;">
              <button class="btn btn-ghost" data-action="edit-device" data-id="${esc(d.id)}">Modifica</button>
              <button class="btn btn-ghost" style="border-color:rgba(239,68,68,0.7);color:#fecaca;" data-action="delete-device" data-id="${esc(d.id)}">Elimina</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderTypeTag(tipo) {
  const t = (tipo || '').toLowerCase();
  const base = 'tag-type ';
  if (t === 'mobile') return `<span class="${base} tag-mobile">MOBILE</span>`;
  if (t === 'fisso')  return `<span class="${base} tag-fisso">FISSO</span>`;
  if (t === 'luce')   return `<span class="${base} tag-luce">LUCE</span>`;
  if (t === 'gas')    return `<span class="${base} tag-gas">GAS</span>`;
  if (t === 'tv')     return `<span class="${base} tag-tv">TV</span>`;
  return `<span class="${base}">${esc(tipo || '')}</span>`;
}

function renderInsightBlock() {
  const { customers, contracts, devices } = State.data;
  const perTipo = contracts.reduce((acc, c) => {
    const key = (c.tipo || 'Altro').toLowerCase();
    acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {});
  const tot = contracts.length || 1;
  const topTipo = Object.entries(perTipo).sort((a,b) => b[1]-a[1])[0];

  return `
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="pill-sm">
          <span class="pill-sm-dot"></span>
          <span>${customers.length} clienti</span>
        </div>
        <div class="pill-sm">
          <span class="pill-sm-dot" style="background:#f97316;"></span>
          <span>${contracts.length} contratti</span>
        </div>
        <div class="pill-sm">
          <span class="pill-sm-dot" style="background:#22c55e;"></span>
          <span>${devices.length} device</span>
        </div>
      </div>

      <div style="font-size:12px;color:var(--muted);">
        ${topTipo
          ? `Contratti prevalenti: <strong style="color:#e5e7eb;">${topTipo[0].toUpperCase()}</strong> (${Math.round(topTipo[1]/tot*100)}%)`
          : 'Ancora nessun contratto, i primi dati arriveranno qui.'}
      </div>

      <button class="btn btn-primary" data-action="new-contract">
        ⚡ Registra un nuovo contratto
      </button>
    </div>
  `;
}

function renderModal(kind, editing) {
  const title =
    kind === 'client'   ? (editing ? 'Modifica cliente'   : 'Nuovo cliente') :
    kind === 'contract' ? (editing ? 'Modifica contratto' : 'Nuovo contratto') :
                          (editing ? 'Modifica device'    : 'Nuovo device');

  const sub =
    kind === 'client'   ? 'Anagrafica base' :
    kind === 'contract' ? 'Dati contrattuali principali' :
                          'Informazioni sul terminale';

  const c = editing || {};

  return `
    <div class="modal-backdrop">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">
            <span>${title}</span>
            <span class="sub">${sub}</span>
          </div>
          <button class="modal-close" data-action="close-modal">✕</button>
        </div>

        ${kind === 'client' ? renderClientForm(c) :
          kind === 'contract' ? renderContractForm(c) :
          renderDeviceForm(c)}

      </div>
    </div>
  `;
}

function bindEvents() {
  const root = document.getElementById('app');

  root.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      State.ui.tab = btn.getAttribute('data-tab');
      render();
    });
  });

  root.querySelectorAll('[data-action]').forEach(btn => {
    const action = btn.getAttribute('data-action');
    btn.addEventListener('click', () => {
      if (action === 'new-client') {
        State.ui.modal = 'client';
        State.ui.editing = null;
        render();
      } else if (action === 'new-contract') {
        State.ui.modal = 'contract';
        State.ui.editing = null;
        render();
      } else if (action === 'new-device') {
        State.ui.modal = 'device';
        State.ui.editing = null;
        render();
      } else if (action === 'close-modal') {
        State.ui.modal = null;
        State.ui.editing = null;
        render();
      } else if (action === 'clear-search') {
        State.ui.search = '';
        render();
      } else if (action === 'delete-client') {
        const id = btn.getAttribute('data-id');
        if (confirm('Eliminare definitivamente il cliente?')) {
          State.removeCustomer(id);
        }
      } else if (action === 'delete-contract') {
        const id = btn.getAttribute('data-id');
        if (confirm('Eliminare definitivamente il contratto?')) {
          State.removeContract(id);
        }
      } else if (action === 'delete-device') {
        const id = btn.getAttribute('data-id');
        if (confirm('Eliminare definitivamente il device?')) {
          State.removeDevice(id);
        }
      } else if (action === 'edit-client') {
        const id = btn.getAttribute('data-id');
        State.ui.editing = State.data.customers.find(c => c.id === id) || null;
        State.ui.modal = 'client';
        render();
      } else if (action === 'edit-contract') {
        const id = btn.getAttribute('data-id');
        State.ui.editing = State.data.contracts.find(c => c.id === id) || null;
        State.ui.modal = 'contract';
        render();
      } else if (action === 'edit-device') {
        const id = btn.getAttribute('data-id');
        State.ui.editing = State.data.devices.find(c => c.id === id) || null;
        State.ui.modal = 'device';
        render();
      }
    });
  });

  const searchInput = root.querySelector('.search-input');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      State.ui.search = e.target.value;
      render();
    });
  }

  const modal = document.querySelector('.modal');
  if (modal) {
    const formClient = modal.querySelector('form[data-form="client"]');
    const formContract = modal.querySelector('form[data-form="contract"]');
    const formDevice = modal.querySelector('form[data-form="device"]');

    if (formClient) {
      formClient.addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(formClient);
        State.upsertCustomer({
          codice_fiscale: fd.get('codice_fiscale') || '',
          telefono: fd.get('telefono') || '',
          nome: fd.get('nome') || '',
          cognome: fd.get('cognome') || '',
          email: (fd.get('email') || '').toLowerCase(),
          residenza: fd.get('residenza') || ''
        });
      });
    }
    if (formContract) {
      formContract.addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(formContract);
        State.upsertContract({
          codice_fiscale: fd.get('codice_fiscale') || '',
          compagnia: fd.get('compagnia') || '',
          tipo: fd.get('tipo') || '',
          numero: fd.get('numero') || '',
          offerta: fd.get('offerta') || '',
          costo_mensile: fd.get('costo_mensile') || '',
          data_attivazione: fd.get('data_attivazione') || '',
          mesi_vincolo: fd.get('mesi_vincolo') || ''
        });
      });
    }
    if (formDevice) {
      formDevice.addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(formDevice);
        State.upsertDevice({
          codice_fiscale: fd.get('codice_fiscale') || '',
          marca: fd.get('marca') || '',
          modello: fd.get('modello') || '',
          imei: fd.get('imei') || '',
          metodo: fd.get('metodo') || '',
          note: fd.get('note') || ''
        });
      });
    }
  }
}

(async () => {
  await State.init();
  render();
})();
</script>
