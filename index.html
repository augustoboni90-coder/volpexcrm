<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Volpex CRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --border: #d1d5db;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --accent-strong: #1d4ed8;
      --danger: #dc2626;
      --muted: #6b7280;
      --text: #111827;
      --radius-lg: 16px;
      --radius-md: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #e5edff 0, #f3f4f6 40%, #e5e7eb 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    #app {
      width: 100%;
      max-width: 1200px;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      border: 1px solid rgba(209,213,219,0.8);
      box-shadow:
        0 16px 40px rgba(15,23,42,0.10),
        0 0 0 1px rgba(148,163,184,0.18);
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 640px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    .sidebar {
      padding: 18px 16px;
      border-right: 1px solid rgba(209,213,219,0.9);
      background: linear-gradient(180deg, #eff6ff 0%, #ffffff 40%, #f9fafb 100%);
    }

    @media (max-width: 900px) {
      .sidebar {
        border-right: none;
        border-bottom: 1px solid rgba(209,213,219,0.9);
      }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #fb923c, #f97316);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow:
        0 8px 18px rgba(249,115,22,0.5),
        0 0 0 1px rgba(248,250,252,0.9);
    }

    .logo-text-main {
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
      color: #111827;
    }

    .logo-text-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .nav-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin: 10px 0 6px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 14px;
    }

    .nav-btn {
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 7px 10px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.08s ease;
    }

    .nav-btn span.icon {
      font-size: 16px;
      width: 18px;
      text-align: center;
    }

    .nav-btn.active {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
      transform: translateX(1px);
      font-weight: 500;
    }

    .nav-btn:hover:not(.active) {
      background: #f3f4ff;
      border-color: #e5e7eb;
      color: #1f2937;
    }

    .sync-box {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 12px;
      border: 1px solid #bbf7d0;
      background: #ecfdf5;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #166534;
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34,197,94,0.25);
    }

    .main {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f9fafb;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .headline {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .headline-title {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }

    .headline-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .badge {
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      font-size: 11px;
      color: #1d4ed8;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      padding: 7px 11px;
      font-size: 13px;
      outline: none;
      background: #ffffff;
    }

    .search-input::placeholder {
      color: #9ca3af;
    }

    .btn {
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      font-size: 13px;
      padding: 7px 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.08s ease;
    }

    .btn:hover {
      background: #f3f4f6;
      border-color: #cbd5f5;
    }

    .btn-primary {
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      border-color: #2563eb;
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(37,99,235,0.35);
      font-weight: 500;
    }

    .btn-primary:hover {
      background: linear-gradient(90deg, #2563eb, #1d4ed8);
      transform: translateY(-1px);
    }

    .btn-danger {
      border-color: #fecaca;
      color: #b91c1c;
      background: #fee2e2;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1.1fr;
      gap: 12px;
      margin-top: 4px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: #ffffff;
      border-radius: var(--radius-lg);
      padding: 12px 12px 10px;
      border: 1px solid #e5e7eb;
      box-shadow:
        0 8px 20px rgba(15,23,42,0.04);
    }

    .panel-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .panel-sub {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th, td {
      padding: 6px 4px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
    }

    th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9ca3af;
      font-weight: 500;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .muted {
      color: var(--muted);
      font-size: 11px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      font-size: 11px;
      color: #374151;
    }

    .chip-strong {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .tag {
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border: 1px solid #e5e7eb;
      color: #4b5563;
    }

    .tag-mobile { border-color:#bbf7d0; background:#ecfdf5; color:#15803d; }
    .tag-fisso  { border-color:#bfdbfe; background:#eff6ff; color:#1d4ed8; }
    .tag-luce   { border-color:#fde68a; background:#fffbeb; color:#92400e; }
    .tag-gas    { border-color:#fecaca; background:#fef2f2; color:#b91c1c; }
    .tag-tv     { border-color:#e9d5ff; background:#f5f3ff; color:#6b21a8; }

    .empty {
      padding: 16px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      border-radius: var(--radius-md);
      border: 1px dashed #d1d5db;
      background: #f9fafb;
      margin-top: 4px;
    }

    .stats-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      font-size: 11px;
      color: #4b5563;
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #2563eb;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 30;
    }

    .modal {
      width: 100%;
      max-width: 540px;
      background: #ffffff;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 20px 40px rgba(15,23,42,0.25);
      padding: 14px 14px 10px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .modal-title-main {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
    }

    .modal-title-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .modal-close {
      border-radius: 999px;
      width: 28px;
      height: 28px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #4b5563;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px 10px;
    }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 4px;
    }

    .field label {
      font-size: 11px;
      color: #4b5563;
    }

    .field input,
    .field select {
      border-radius: 9px;
      border: 1px solid #d1d5db;
      padding: 6px 8px;
      font-size: 12px;
      outline: none;
      background: #f9fafb;
    }

    .field input:focus,
    .field select:focus {
      border-color: #2563eb;
      background: #ffffff;
      box-shadow: 0 0 0 1px rgba(37,99,235,0.1);
    }

    .field input::placeholder {
      color: #9ca3af;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      background: #16a34a;
      color: #ecfdf5;
      box-shadow: 0 12px 24px rgba(22,163,74,0.55);
      z-index: 40;
    }

    .toast.error {
      background: #dc2626;
      box-shadow: 0 12px 24px rgba(220,38,38,0.55);
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  // ==============================
  // 🔗 CONFIGURAZIONE API VOLPEX
  // ==============================
  const API_URL = 'https://script.google.com/macros/s/AKfycbxtaqy6Yv3fKlQB3nMrhEd0GdGAzAYzrF5VoRFzgrtRgK7nqvaxoCLF479YJtupn089/exec';

  // ==============================
  // 🧠 STATO CENTRALE
  // ==============================
  const State = {
    data: {
      customers: [],
      contracts: [],
      devices: []
    },
    ui: {
      tab: 'clients',     // clients | contracts | devices
      search: '',
      modal: null,        // null | 'client' | 'contract' | 'device'
      editing: null,      // record in modifica
      syncing: false
    },

    async init() {
      try {
        const res = await fetch(API_URL + '?type=all');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        this.data = {
          customers: Array.isArray(json.customers) ? json.customers : [],
          contracts: Array.isArray(json.contracts) ? json.contracts : [],
          devices: Array.isArray(json.devices) ? json.devices : []
        };
        localStorage.setItem('volpex_state', JSON.stringify(this.data));
      } catch (err) {
        console.warn('Errore caricamento remoto, uso cache locale se presente:', err);
        const cached = localStorage.getItem('volpex_state');
        if (cached) {
          this.data = JSON.parse(cached);
        }
      }
    },

    async save() {
      this.ui.syncing = true;
      render();
      try {
        // 🔴 Importante: NESSUN "Content-Type" header
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(this.data)
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        localStorage.setItem('volpex_state', JSON.stringify(this.data));
        showToast('Dati sincronizzati con Volpex Sheet');
      } catch (err) {
        console.error('Errore salvataggio:', err);
        showToast('Errore salvataggio su Google Sheet', 'error');
      } finally {
        this.ui.syncing = false;
        render();
      }
    },

    upsertCustomer(payload) {
      const list = [...this.data.customers];
      if (this.ui.editing) {
        const idx = list.findIndex(c => c.id === this.ui.editing.id);
        if (idx !== -1) list[idx] = { ...list[idx], ...payload };
      } else {
        list.unshift({
          id: 'c_' + Date.now(),
          ...payload
        });
      }
      this.data.customers = list;
      this.ui.modal = null;
      this.ui.editing = null;
      this.save();
    },

    removeCustomer(id) {
      this.data.customers = this.data.customers.filter(c => c.id !== id);
      this.save();
    },

    upsertContract(payload) {
      const list = [...this.data.contracts];
      if (this.ui.editing) {
        const idx = list.findIndex(c => c.id === this.ui.editing.id);
        if (idx !== -1) list[idx] = { ...list[idx], ...payload };
      } else {
        list.unshift({
          id: 'ctr_' + Date.now(),
          ...payload
        });
      }
      this.data.contracts = list;
      this.ui.modal = null;
      this.ui.editing = null;
      this.save();
    },

    removeContract(id) {
      this.data.contracts = this.data.contracts.filter(c => c.id !== id);
      this.save();
    },

    upsertDevice(payload) {
      const list = [...this.data.devices];
      if (this.ui.editing) {
        const idx = list.findIndex(d => d.id === this.ui.editing.id);
        if (idx !== -1) list[idx] = { ...list[idx], ...payload };
      } else {
        list.unshift({
          id: 'dev_' + Date.now(),
          ...payload
        });
      }
      this.data.devices = list;
      this.ui.modal = null;
      this.ui.editing = null;
      this.save();
    },

    removeDevice(id) {
      this.data.devices = this.data.devices.filter(d => d.id !== id);
      this.save();
    }
  };

  let toastTimeout = null;

  function showToast(msg, type = 'success') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const el = document.createElement('div');
    el.className = 'toast' + (type === 'error' ? ' error' : '');
    el.textContent = msg;
    document.body.appendChild(el);
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => el.remove(), 2800);
  }

  function esc(str) {
    return (str ?? '').toString().replace(/[&<>"]/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;'
    }[c]));
  }

  // ==============================
  // 🎨 RENDER UI
  // ==============================
  function render() {
    const root = document.getElementById('app');
    const { tab, search, modal, editing, syncing } = State.ui;
    const { customers, contracts, devices } = State.data;

    const q = search.trim().toLowerCase();

    const filteredCustomers = !q ? customers : customers.filter(c =>
      (c.nome || '').toLowerCase().includes(q) ||
      (c.cognome || '').toLowerCase().includes(q) ||
      (c.codice_fiscale || '').toLowerCase().includes(q)
    );

    const filteredContracts = !q ? contracts : contracts.filter(c =>
      (c.codice_fiscale || '').toLowerCase().includes(q) ||
      (c.compagnia || '').toLowerCase().includes(q) ||
      (c.offerta || '').toLowerCase().includes(q) ||
      (c.numero || '').toLowerCase().includes(q)
    );

    const filteredDevices = !q ? devices : devices.filter(d =>
      (d.codice_fiscale || '').toLowerCase().includes(q) ||
      (d.marca || '').toLowerCase().includes(q) ||
      (d.modello || '').toLowerCase().includes(q) ||
      (d.imei || '').toLowerCase().includes(q)
    );

    root.innerHTML = `
      <div class="layout">
        <aside class="sidebar">
          <div class="logo">
            <div class="logo-mark">🦊</div>
            <div>
              <div class="logo-text-main">VOLPEX CRM</div>
              <div class="logo-text-sub">Gestione clienti e contratti</div>
            </div>
          </div>

          <div class="nav-label">Vista</div>
          <div class="nav">
            <button class="nav-btn ${tab === 'clients' ? 'active' : ''}" data-tab="clients">
              <span class="icon">👥</span>
              <span>Clienti</span>
            </button>
            <button class="nav-btn ${tab === 'contracts' ? 'active' : ''}" data-tab="contracts">
              <span class="icon">📄</span>
              <span>Contratti</span>
            </button>
            <button class="nav-btn ${tab === 'devices' ? 'active' : ''}" data-tab="devices">
              <span class="icon">📱</span>
              <span>Device</span>
            </button>
          </div>

          <div class="nav-label">Azioni</div>
          <div class="nav">
            <button class="nav-btn" data-action="new-client">
              <span class="icon">➕</span>
              <span>Nuovo cliente</span>
            </button>
            <button class="nav-btn" data-action="new-contract">
              <span class="icon">⚡</span>
              <span>Nuovo contratto</span>
            </button>
            <button class="nav-btn" data-action="new-device">
              <span class="icon">📦</span>
              <span>Aggiungi device</span>
            </button>
          </div>

          <div class="sync-box">
            <div class="sync-dot" style="opacity:${syncing ? 1 : 0.45}"></div>
            <div>
              <div style="font-weight:500;font-size:11px;">Volpex Sheet Sync</div>
              <div style="font-size:11px;">
                ${syncing ? 'Salvataggio in corso…' : 'Ultima versione salvata'}
              </div>
            </div>
          </div>
        </aside>

        <main class="main">
          <div class="top-bar">
            <div class="headline">
              <div class="headline-title">
                ${tab === 'clients' ? 'Clienti' : tab === 'contracts' ? 'Contratti' : 'Device'}
              </div>
              <div class="headline-sub">
                Vista rapida dei dati gestiti da Volpex
              </div>
            </div>
            <div class="badge">
              <span>📊</span>
              <span>Collegato a Google Sheets</span>
            </div>
          </div>

          <div class="search-row">
            <input class="search-input" placeholder="Cerca per nome, CF, numero…" value="${esc(search)}" />
            <button class="btn" data-action="clear-search">Pulisci</button>
          </div>

          <div class="grid">
            <section class="panel">
              <div class="panel-title">
                ${tab === 'clients'
                  ? 'Elenco clienti'
                  : tab === 'contracts'
                    ? 'Elenco contratti'
                    : 'Elenco device'}
              </div>
              <div class="panel-sub">
                ${tab === 'clients'
                  ? `${customers.length} clienti in anagrafica`
                  : tab === 'contracts'
                    ? `${contracts.length} contratti registrati`
                    : `${devices.length} device associati`}
              </div>

              ${tab === 'clients'
                ? renderClientsTable(filteredCustomers)
                : tab === 'contracts'
                  ? renderContractsTable(filteredContracts)
                  : renderDevicesTable(filteredDevices)}
            </section>

            <section class="panel">
              <div class="panel-title">Riepilogo</div>
              <div class="panel-sub">
                Piccola panoramica dello stato del portafoglio.
              </div>
              ${renderInsights()}
            </section>
          </div>
        </main>
      </div>

      ${modal ? renderModal(modal, editing) : ''}
    `;

    bindEvents();
  }

  function renderClientsTable(list) {
    if (!list.length) {
      return `<div class="empty">Nessun cliente ancora inserito. Usa "Nuovo cliente" per iniziare.</div>`;
    }
    return `
      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Codice fiscale</th>
            <th>Contatti</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${list.map(c => `
            <tr>
              <td>
                <div>${esc(c.nome || '')} ${esc(c.cognome || '')}</div>
                <div class="muted">${esc(c.residenza || '')}</div>
              </td>
              <td><span class="chip chip-strong">${esc(c.codice_fiscale || '')}</span></td>
              <td>
                <div>${esc(c.telefono || '')}</div>
                <div class="muted">${esc(c.email || '')}</div>
              </td>
              <td style="text-align:right;">
                <button class="btn" data-action="edit-client" data-id="${esc(c.id)}">Modifica</button>
                <button class="btn btn-danger" data-action="delete-client" data-id="${esc(c.id)}">Elimina</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function renderContractsTable(list) {
    if (!list.length) {
      return `<div class="empty">Ancora nessun contratto registrato.</div>`;
    }
    return `
      <table>
        <thead>
          <tr>
            <th>Cliente / CF</th>
            <th>Offerta</th>
            <th>Tipo</th>
            <th>€/mese</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${list.map(c => `
            <tr>
              <td>
                <div>${esc(c.codice_fiscale || '')}</div>
                <div class="muted">${esc(c.compagnia || '')}</div>
              </td>
              <td>
                <div><span class="chip chip-strong">${esc(c.offerta || '')}</span></div>
                <div class="muted">${esc(c.numero || '')}</div>
              </td>
              <td>${renderTypeTag(c.tipo)}</td>
              <td><strong>${esc(c.costo_mensile || '')}</strong></td>
              <td style="text-align:right;">
                <button class="btn" data-action="edit-contract" data-id="${esc(c.id)}">Modifica</button>
                <button class="btn btn-danger" data-action="delete-contract" data-id="${esc(c.id)}">Elimina</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function renderDevicesTable(list) {
    if (!list.length) {
      return `<div class="empty">Nessun device associato. Puoi registrarli dalla colonna di sinistra.</div>`;
    }
    return `
      <table>
        <thead>
          <tr>
            <th>Cliente / CF</th>
            <th>Device</th>
            <th>IMEI</th>
            <th>Metodo</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${list.map(d => `
            <tr>
              <td>
                <div>${esc(d.codice_fiscale || '')}</div>
                <div class="muted">${esc(d.note || '')}</div>
              </td>
              <td>
                <div>${esc(d.marca || '')} ${esc(d.modello || '')}</div>
              </td>
              <td><span class="chip">${esc(d.imei || '')}</span></td>
              <td><span class="chip">${esc(d.metodo || '')}</span></td>
              <td style="text-align:right;">
                <button class="btn" data-action="edit-device" data-id="${esc(d.id)}">Modifica</button>
                <button class="btn btn-danger" data-action="delete-device" data-id="${esc(d.id)}">Elimina</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function renderTypeTag(tipo) {
    const t = (tipo || '').toLowerCase();
    const base = 'tag ';
    if (t === 'mobile') return `<span class="${base} tag-mobile">MOBILE</span>`;
    if (t === 'fisso')  return `<span class="${base} tag-fisso">FISSO</span>`;
    if (t === 'luce')   return `<span class="${base} tag-luce">LUCE</span>`;
    if (t === 'gas')    return `<span class="${base} tag-gas">GAS</span>`;
    if (t === 'tv')     return `<span class="${base} tag-tv">TV</span>`;
    return `<span class="${base}">${esc(tipo || '')}</span>`;
  }

  function renderInsights() {
    const { customers, contracts, devices } = State.data;
    const perTipo = contracts.reduce((acc, c) => {
      const key = (c.tipo || 'Altro').toLowerCase();
      acc[key] = (acc[key] || 0) + 1;
      return acc;
    }, {});
    const totContratti = contracts.length || 1;
    const topTipo = Object.entries(perTipo).sort((a,b) => b[1] - a[1])[0];

    return `
      <div class="stats-pills">
        <div class="pill">
          <span class="pill-dot"></span>
          <span>${customers.length} clienti</span>
        </div>
        <div class="pill">
          <span class="pill-dot" style="background:#22c55e;"></span>
          <span>${contracts.length} contratti</span>
        </div>
        <div class="pill">
          <span class="pill-dot" style="background:#f97316;"></span>
          <span>${devices.length} device</span>
        </div>
      </div>

      <div style="font-size:12px; color:#4b5563; margin-bottom:10px;">
        ${topTipo
          ? `Tipo prevalente: <strong>${topTipo[0].toUpperCase()}</strong> (${Math.round(topTipo[1]/totContratti*100)}%)`
          : 'Quando inserirai i primi contratti vedrai qui il riepilogo per tipologia.'}
      </div>

      <button class="btn btn-primary" data-action="new-contract">
        ⚡ Registra un nuovo contratto
      </button>
    `;
  }

  function renderModal(kind, editing) {
    const title =
      kind === 'client'
        ? (editing ? 'Modifica cliente' : 'Nuovo cliente')
        : kind === 'contract'
          ? (editing ? 'Modifica contratto' : 'Nuovo contratto')
          : (editing ? 'Modifica device' : 'Nuovo device');

    const sub =
      kind === 'client'
        ? 'Dati anagrafici principali'
        : kind === 'contract'
          ? 'Dati sintetici del contratto'
          : 'Informazioni sul terminale';

    const c = editing || {};

    return `
      <div class="modal-backdrop">
        <div class="modal">
          <div class="modal-header">
            <div>
              <div class="modal-title-main">${title}</div>
              <div class="modal-title-sub">${sub}</div>
            </div>
            <button class="modal-close" data-action="close-modal">✕</button>
          </div>

          ${kind === 'client'
            ? renderClientForm(c)
            : kind === 'contract'
              ? renderContractForm(c)
              : renderDeviceForm(c)}
        </div>
      </div>
    `;
  }

  function renderClientForm(c) {
    return `
      <form data-form="client">
        <div class="form-grid">
          <div class="field">
            <label>Codice fiscale</label>
            <input name="codice_fiscale" required placeholder="RSSMRA80A01H501U" value="${esc(c.codice_fiscale || '')}" />
          </div>
          <div class="field">
            <label>Telefono</label>
            <input name="telefono" required placeholder="3331234567" value="${esc(c.telefono || '')}" />
          </div>
          <div class="field">
            <label>Nome</label>
            <input name="nome" required value="${esc(c.nome || '')}" />
          </div>
          <div class="field">
            <label>Cognome</label>
            <input name="cognome" required value="${esc(c.cognome || '')}" />
          </div>
          <div class="field">
            <label>Email</label>
            <input name="email" type="email" placeholder="nome@dominio.it" value="${esc(c.email || '')}" />
          </div>
          <div class="field">
            <label>Residenza</label>
            <input name="residenza" placeholder="Via, città…" value="${esc(c.residenza || '')}" />
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn" data-action="close-modal">Annulla</button>
          <button type="submit" class="btn btn-primary">Salva cliente</button>
        </div>
      </form>
    `;
  }

  function renderContractForm(c) {
    return `
      <form data-form="contract">
        <div class="form-grid">
          <div class="field">
            <label>Codice fiscale cliente</label>
            <input name="codice_fiscale" required value="${esc(c.codice_fiscale || '')}" />
          </div>
          <div class="field">
            <label>Compagnia</label>
            <input name="compagnia" placeholder="WindTre, TIM…" value="${esc(c.compagnia || '')}" />
          </div>
          <div class="field">
            <label>Tipo</label>
            <select name="tipo">
              <option value="">–</option>
              <option value="Mobile" ${c.tipo === 'Mobile' ? 'selected' : ''}>Mobile</option>
              <option value="Fisso"  ${c.tipo === 'Fisso'  ? 'selected' : ''}>Fisso</option>
              <option value="Luce"   ${c.tipo === 'Luce'   ? 'selected' : ''}>Luce</option>
              <option value="Gas"    ${c.tipo === 'Gas'    ? 'selected' : ''}>Gas</option>
              <option value="TV"     ${c.tipo === 'TV'     ? 'selected' : ''}>TV</option>
            </select>
          </div>
          <div class="field">
            <label>Numero linea / contratto</label>
            <input name="numero" value="${esc(c.numero || '')}" />
          </div>
          <div class="field">
            <label>Offerta</label>
            <input name="offerta" placeholder="New Basic, Family 5G…" value="${esc(c.offerta || '')}" />
          </div>
          <div class="field">
            <label>Costo mensile (€)</label>
            <input name="costo_mensile" type="number" step="0.01" value="${esc(c.costo_mensile || '')}" />
          </div>
          <div class="field">
            <label>Data attivazione</label>
            <input name="data_attivazione" type="date" value="${esc(c.data_attivazione || '')}" />
          </div>
          <div class="field">
            <label>Mesi vincolo</label>
            <input name="mesi_vincolo" type="number" value="${esc(c.mesi_vincolo || '')}" />
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn" data-action="close-modal">Annulla</button>
          <button type="submit" class="btn btn-primary">Salva contratto</button>
        </div>
      </form>
    `;
  }

  function renderDeviceForm(c) {
    return `
      <form data-form="device">
        <div class="form-grid">
          <div class="field">
            <label>Codice fiscale cliente</label>
            <input name="codice_fiscale" required value="${esc(c.codice_fiscale || '')}" />
          </div>
          <div class="field">
            <label>Marca</label>
            <input name="marca" value="${esc(c.marca || '')}" />
          </div>
          <div class="field">
            <label>Modello</label>
            <input name="modello" value="${esc(c.modello || '')}" />
          </div>
          <div class="field">
            <label>IMEI</label>
            <input name="imei" value="${esc(c.imei || '')}" />
          </div>
          <div class="field">
            <label>Metodo pagamento</label>
            <input name="metodo" placeholder="Contanti, rate…" value="${esc(c.metodo || '')}" />
          </div>
          <div class="field">
            <label>Note</label>
            <input name="note" value="${esc(c.note || '')}" />
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn" data-action="close-modal">Annulla</button>
          <button type="submit" class="btn btn-primary">Salva device</button>
        </div>
      </form>
    `;
  }

  // ==============================
  // 🧷 EVENTI
  // ==============================
  function bindEvents() {
    const root = document.getElementById('app');

    root.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        State.ui.tab = btn.getAttribute('data-tab');
        render();
      });
    });

    root.querySelectorAll('[data-action]').forEach(btn => {
      const act = btn.getAttribute('data-action');
      btn.addEventListener('click', () => {
        if (act === 'new-client') {
          State.ui.modal = 'client';
          State.ui.editing = null;
          render();
        } else if (act === 'new-contract') {
          State.ui.modal = 'contract';
          State.ui.editing = null;
          render();
        } else if (act === 'new-device') {
          State.ui.modal = 'device';
          State.ui.editing = null;
          render();
        } else if (act === 'close-modal') {
          State.ui.modal = null;
          State.ui.editing = null;
          render();
        } else if (act === 'clear-search') {
          State.ui.search = '';
          render();
        } else if (act === 'delete-client') {
          const id = btn.getAttribute('data-id');
          if (confirm('Eliminare definitivamente il cliente?')) {
            State.removeCustomer(id);
          }
        } else if (act === 'delete-contract') {
          const id = btn.getAttribute('data-id');
          if (confirm('Eliminare definitivamente il contratto?')) {
            State.removeContract(id);
          }
        } else if (act === 'delete-device') {
          const id = btn.getAttribute('data-id');
          if (confirm('Eliminare definitivamente il device?')) {
            State.removeDevice(id);
          }
        } else if (act === 'edit-client') {
          const id = btn.getAttribute('data-id');
          State.ui.editing = State.data.customers.find(c => c.id === id) || null;
          State.ui.modal = 'client';
          render();
        } else if (act === 'edit-contract') {
          const id = btn.getAttribute('data-id');
          State.ui.editing = State.data.contracts.find(c => c.id === id) || null;
          State.ui.modal = 'contract';
          render();
        } else if (act === 'edit-device') {
          const id = btn.getAttribute('data-id');
          State.ui.editing = State.data.devices.find(d => d.id === id) || null;
          State.ui.modal = 'device';
          render();
        }
      });
    });

    const searchInput = root.querySelector('.search-input');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        State.ui.search = e.target.value;
        render();
      });
    }

    const modal = document.querySelector('.modal');
    if (modal) {
      const clientForm = modal.querySelector('form[data-form="client"]');
      const contractForm = modal.querySelector('form[data-form="contract"]');
      const deviceForm = modal.querySelector('form[data-form="device"]');

      if (clientForm) {
        clientForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const fd = new FormData(clientForm);
          State.upsertCustomer({
            codice_fiscale: fd.get('codice_fiscale') || '',
            telefono: fd.get('telefono') || '',
            nome: fd.get('nome') || '',
            cognome: fd.get('cognome') || '',
            email: (fd.get('email') || '').toLowerCase(),
            residenza: fd.get('residenza') || ''
          });
        });
      }
      if (contractForm) {
        contractForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const fd = new FormData(contractForm);
          State.upsertContract({
            codice_fiscale: fd.get('codice_fiscale') || '',
            compagnia: fd.get('compagnia') || '',
            tipo: fd.get('tipo') || '',
            numero: fd.get('numero') || '',
            offerta: fd.get('offerta') || '',
            costo_mensile: fd.get('costo_mensile') || '',
            data_attivazione: fd.get('data_attivazione') || '',
            mesi_vincolo: fd.get('mesi_vincolo') || ''
          });
        });
      }
      if (deviceForm) {
        deviceForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const fd = new FormData(deviceForm);
          State.upsertDevice({
            codice_fiscale: fd.get('codice_fiscale') || '',
            marca: fd.get('marca') || '',
            modello: fd.get('modello') || '',
            imei: fd.get('imei') || '',
            metodo: fd.get('metodo') || '',
            note: fd.get('note') || ''
          });
        });
      }
    }
  }

  // ==============================
  // 🚀 AVVIO
  // ==============================
  (async () => {
    await State.init();
    render();
  })();
</script>
</body>
</html>
