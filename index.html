<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>CRM Clienti & Contratti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #1f2933;
      color: white;
      padding: 16px 24px;
    }
    header h1 {
      margin: 0;
      font-size: 20px;
    }
    .container {
      padding: 16px 24px 32px;
    }
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }
    .top-bar input[type="text"] {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      min-width: 200px;
    }
    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .btn-danger {
      background: #dc2626;
      color: #fff;
    }
    .status {
      font-size: 13px;
      color: #4b5563;
      margin-left: auto;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(0, 1.7fr);
      gap: 16px;
    }
    @media (max-width: 1000px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.12);
    }
    thead {
      background: #111827;
      color: #f9fafb;
    }
    th, td {
      padding: 6px 8px;
      font-size: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    tbody tr {
      cursor: pointer;
    }
    tbody tr:hover {
      background: #f9fafb;
    }
    tbody tr.selected {
      background: #dbeafe;
    }
    form {
      background: white;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.12);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    form h2 {
      margin: 0 0 4px;
      font-size: 16px;
    }
    label {
      font-size: 13px;
      font-weight: 500;
    }
    input[type="text"],
    input[type="email"],
    input[type="date"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-size: 13px;
      box-sizing: border-box;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    .form-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .form-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    small {
      font-size: 11px;
      color: #6b7280;
    }
    h3 {
      margin: 8px 0;
      font-size: 14px;
    }
    .section-card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.12);
    }
  </style>
</head>
<body>
  <header>
    <h1>CRM Clienti & Contratti (Google Sheet)</h1>
  </header>

  <div class="container">
    <div class="top-bar">
      <input type="text" id="searchClienti" placeholder="Cerca cliente per nome, cognome, telefono, email..." />
      <button class="btn-primary" id="btnNewCliente">Nuovo cliente</button>
      <span class="status" id="status">Caricamento...</span>
    </div>

    <div class="layout">
      <!-- COLONNA SINISTRA: CLIENTI -->
      <div>
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Cognome</th>
              <th>Telefono</th>
              <th>Email</th>
            </tr>
          </thead>
          <tbody id="tbodyClienti">
            <!-- righe clienti -->
          </tbody>
        </table>

        <form id="formCliente">
          <h2>Dati cliente</h2>
          <input type="hidden" id="cli_id_cliente" />

          <div class="form-row">
            <div>
              <label for="cli_nome">Nome</label>
              <input type="text" id="cli_nome" required />
            </div>
            <div>
              <label for="cli_cognome">Cognome</label>
              <input type="text" id="cli_cognome" required />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label for="cli_telefono">Telefono</label>
              <input type="text" id="cli_telefono" />
            </div>
            <div>
              <label for="cli_email">Email</label>
              <input type="email" id="cli_email" />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label for="cli_codice_fiscale">Codice fiscale</label>
              <input type="text" id="cli_codice_fiscale" />
            </div>
            <div>
              <label for="cli_data_nascita">Data nascita</label>
              <input type="date" id="cli_data_nascita" />
            </div>
          </div>

          <div>
            <label for="cli_note">Note</label>
            <textarea id="cli_note"></textarea>
          </div>

          <small id="cli_info"></small>

          <div class="form-actions">
            <button type="button" class="btn-secondary" id="btnClearCliente">Svuota</button>
            <button type="button" class="btn-danger" id="btnDeleteCliente">Elimina cliente</button>
            <button type="submit" class="btn-primary">Salva cliente</button>
          </div>
        </form>
      </div>

      <!-- COLONNA DESTRA: CONTRATTI -->
      <div>
        <div class="section-card">
          <h3>Contratti del cliente selezionato</h3>
          <table>
            <thead>
              <tr>
                <th>ID contratto</th>
                <th>Data</th>
                <th>Tipo cliente</th>
                <th>Tecnologia</th>
                <th>Offerta</th>
                <th>Numero</th>
              </tr>
            </thead>
            <tbody id="tbodyContratti">
              <!-- righe contratti -->
            </tbody>
          </table>
        </div>

        <form id="formContratto">
          <h2>Dati contratto</h2>
          <input type="hidden" id="ctr_id_contratto" />

          <div class="form-row">
            <div>
              <label>ID cliente</label>
              <input type="text" id="ctr_id_cliente" readonly />
            </div>
            <div>
              <label>Codice fiscale</label>
              <input type="text" id="ctr_codice_fiscale" />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label>Data contratto</label>
              <input type="date" id="ctr_data_contratto" />
            </div>
            <div>
              <label>Tipo cliente</label>
              <select id="ctr_tipo_cliente">
                <option value="">--</option>
                <option value="privato">Privato</option>
                <option value="business">Business</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div>
              <label>Tipo attivazione</label>
              <input type="text" id="ctr_tipo_attivazione" placeholder="Mobile / Fisso / etc." />
            </div>
            <div>
              <label>Tecnologia</label>
              <input type="text" id="ctr_tecnologia" placeholder="SIM / FTTH / etc." />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label>Convergenza</label>
              <select id="ctr_convergenza">
                <option value="">--</option>
                <option value="SI">SI</option>
                <option value="NO">NO</option>
              </select>
            </div>
            <div>
              <label>MNP</label>
              <select id="ctr_mnp">
                <option value="">--</option>
                <option value="SI">SI</option>
                <option value="NO">NO</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div>
              <label>Data attivazione</label>
              <input type="date" id="ctr_data_attivazione" />
            </div>
            <div>
              <label>Data portabilità</label>
              <input type="date" id="ctr_data_portabilita" />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label>Numero lavorato</label>
              <input type="text" id="ctr_numero_lavorato" />
            </div>
            <div>
              <label>Nome offerta</label>
              <input type="text" id="ctr_nome_offerta" />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label>Costo offerta (€)</label>
              <input type="number" step="0.01" id="ctr_costo_offerta" />
            </div>
            <div>
              <label>Vincolo offerta (mesi)</label>
              <input type="number" id="ctr_vincolo_offerta_mesi" />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label>Telefono incluso</label>
              <select id="ctr_telefono_incluso">
                <option value="">--</option>
                <option value="SI">SI</option>
                <option value="NO">NO</option>
              </select>
            </div>
            <div>
              <label>IMEI</label>
              <input type="text" id="ctr_imei" />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label>Modello telefono</label>
              <input type="text" id="ctr_modello" />
            </div>
            <div>
              <label>Tipo pagamento</label>
              <input type="text" id="ctr_tipo_pagamento" placeholder="RID / Carta / Bollettino" />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label>Mesi vincolo telefono</label>
              <input type="number" id="ctr_mesi_vincolo_telefono" />
            </div>
            <div>
              <label>Fine vincolo offerta</label>
              <input type="date" id="ctr_data_fine_vincolo_offerta" />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label>Fine vincolo telefono</label>
              <input type="date" id="ctr_data_fine_vincolo_telefono" />
            </div>
            <div></div>
          </div>

          <small id="ctr_info"></small>

          <div class="form-actions">
            <button type="button" class="btn-secondary" id="btnClearContratto">Svuota</button>
            <button type="button" class="btn-danger" id="btnDeleteContratto">Elimina contratto</button>
            <button type="submit" class="btn-primary">Salva contratto</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // URL della tua web app Apps Script
    const API_URL = 'https://script.google.com/macros/s/AKfycbxb0GIQqFXKJl8HRfXzFG7A-sdQHxzBWUotromEyF2zN_pS2RUmL2f20EQ0g7kSMga7/exec';

    let clienti = [];
    let contratti = [];
    let selectedClienteId = null;
    let selectedContrattoId = null;

    const statusEl = document.getElementById('status');

    const searchClientiEl = document.getElementById('searchClienti');
    const tbodyClienti = document.getElementById('tbodyClienti');

    const formCliente = document.getElementById('formCliente');
    const cli_id_cliente = document.getElementById('cli_id_cliente');
    const cli_nome = document.getElementById('cli_nome');
    const cli_cognome = document.getElementById('cli_cognome');
    const cli_telefono = document.getElementById('cli_telefono');
    const cli_email = document.getElementById('cli_email');
    const cli_codice_fiscale = document.getElementById('cli_codice_fiscale');
    const cli_data_nascita = document.getElementById('cli_data_nascita');
    const cli_note = document.getElementById('cli_note');
    const cli_info = document.getElementById('cli_info');
    const btnNewCliente = document.getElementById('btnNewCliente');
    const btnClearCliente = document.getElementById('btnClearCliente');
    const btnDeleteCliente = document.getElementById('btnDeleteCliente');

    const tbodyContratti = document.getElementById('tbodyContratti');
    const formContratto = document.getElementById('formContratto');
    const ctr_id_contratto = document.getElementById('ctr_id_contratto');
    const ctr_id_cliente = document.getElementById('ctr_id_cliente');
    const ctr_codice_fiscale = document.getElementById('ctr_codice_fiscale');
    const ctr_data_contratto = document.getElementById('ctr_data_contratto');
    const ctr_tipo_cliente = document.getElementById('ctr_tipo_cliente');
    const ctr_tipo_attivazione = document.getElementById('ctr_tipo_attivazione');
    const ctr_tecnologia = document.getElementById('ctr_tecnologia');
    const ctr_convergenza = document.getElementById('ctr_convergenza');
    const ctr_mnp = document.getElementById('ctr_mnp');
    const ctr_data_attivazione = document.getElementById('ctr_data_attivazione');
    const ctr_data_portabilita = document.getElementById('ctr_data_portabilita');
    const ctr_numero_lavorato = document.getElementById('ctr_numero_lavorato');
    const ctr_nome_offerta = document.getElementById('ctr_nome_offerta');
    const ctr_costo_offerta = document.getElementById('ctr_costo_offerta');
    const ctr_vincolo_offerta_mesi = document.getElementById('ctr_vincolo_offerta_mesi');
    const ctr_telefono_incluso = document.getElementById('ctr_telefono_incluso');
    const ctr_imei = document.getElementById('ctr_imei');
    const ctr_modello = document.getElementById('ctr_modello');
    const ctr_tipo_pagamento = document.getElementById('ctr_tipo_pagamento');
    const ctr_mesi_vincolo_telefono = document.getElementById('ctr_mesi_vincolo_telefono');
    const ctr_data_fine_vincolo_offerta = document.getElementById('ctr_data_fine_vincolo_offerta');
    const ctr_data_fine_vincolo_telefono = document.getElementById('ctr_data_fine_vincolo_telefono');
    const ctr_info = document.getElementById('ctr_info');
    const btnClearContratto = document.getElementById('btnClearContratto');
    const btnDeleteContratto = document.getElementById('btnDeleteContratto');

    function setStatus(msg) {
      statusEl.textContent = msg || '';
    }

    async function loadClienti() {
      setStatus('Caricamento clienti...');
      try {
        const res = await fetch(API_URL + '?action=listClienti');
        const data = await res.json();
        if (!data.success) {
          setStatus('Errore: ' + (data.error || 'Errore sconosciuto'));
          return;
        }
        clienti = data.data || [];
        renderClienti();
        setStatus(clienti.length + ' clienti caricati');
      } catch (err) {
        console.error(err);
        setStatus('Errore di rete nel caricamento clienti');
      }
    }

    async function loadContratti(clienteId) {
      if (!clienteId) {
        contratti = [];
        renderContratti();
        return;
      }
      setStatus('Caricamento contratti...');
      try {
        const res = await fetch(API_URL + '?action=listContratti&clienteId=' + encodeURIComponent(clienteId));
        const data = await res.json();
        if (!data.success) {
          setStatus('Errore: ' + (data.error || 'Errore sconosciuto'));
          return;
        }
        contratti = data.data || [];
        renderContratti();
        setStatus(contratti.length + ' contratti caricati');
      } catch (err) {
        console.error(err);
        setStatus('Errore di rete nel caricamento contratti');
      }
    }

    function renderClienti() {
      const term = (searchClientiEl.value || '').toLowerCase();
      tbodyClienti.innerHTML = '';

      const filtered = clienti.filter(c => {
        if (!term) return true;
        const text = [
          c.nome,
          c.cognome,
          c.telefono,
          c.email,
          c.codice_fiscale
        ].join(' ').toLowerCase();
        return text.includes(term);
      });

      filtered.forEach(c => {
        const tr = document.createElement('tr');
        tr.dataset.id = c.id_cliente;

        if (c.id_cliente === selectedClienteId) {
          tr.classList.add('selected');
        }

        tr.innerHTML = `
          <td>${c.nome || ''}</td>
          <td>${c.cognome || ''}</td>
          <td>${c.telefono || ''}</td>
          <td>${c.email || ''}</td>
        `;

        tr.addEventListener('click', () => {
          selectCliente(c.id_cliente);
        });

        tbodyClienti.appendChild(tr);
      });

      if (!filtered.length) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 4;
        td.textContent = 'Nessun cliente trovato';
        tr.appendChild(td);
        tbodyClienti.appendChild(tr);
      }
    }

    function renderContratti() {
      tbodyContratti.innerHTML = '';

      contratti.forEach(c => {
        const tr = document.createElement('tr');
        tr.dataset.id = c.id_contratto;
        if (c.id_contratto === selectedContrattoId) {
          tr.classList.add('selected');
        }

        tr.innerHTML = `
          <td>${c.id_contratto || ''}</td>
          <td>${c.data_contratto || ''}</td>
          <td>${c.tipo_cliente || ''}</td>
          <td>${c.tecnologia || ''}</td>
          <td>${c.nome_offerta || ''}</td>
          <td>${c.numero_lavorato || ''}</td>
        `;

        tr.addEventListener('click', () => {
          selectContratto(c.id_contratto);
        });

        tbodyContratti.appendChild(tr);
      });

      if (!contratti.length) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 6;
        td.textContent = selectedClienteId
          ? 'Nessun contratto per questo cliente'
          : 'Seleziona un cliente per vedere i contratti';
        tr.appendChild(td);
        tbodyContratti.appendChild(tr);
      }
    }

    function clearClienteForm() {
      selectedClienteId = null;
      cli_id_cliente.value = '';
      cli_nome.value = '';
      cli_cognome.value = '';
      cli_telefono.value = '';
      cli_email.value = '';
      cli_codice_fiscale.value = '';
      cli_data_nascita.value = '';
      cli_note.value = '';
      cli_info.textContent = '';
      Array.from(tbodyClienti.querySelectorAll('tr')).forEach(tr => tr.classList.remove('selected'));
      // anche contratti
      contratti = [];
      renderContratti();
      clearContrattoForm();
    }

    function selectCliente(id) {
      const c = clienti.find(x => x.id_cliente === id);
      if (!c) return;
      selectedClienteId = id;

      cli_id_cliente.value = c.id_cliente || '';
      cli_nome.value = c.nome || '';
      cli_cognome.value = c.cognome || '';
      cli_telefono.value = c.telefono || '';
      cli_email.value = c.email || '';
      cli_codice_fiscale.value = c.codice_fiscale || '';
      cli_data_nascita.value = c.data_nascita || '';
      cli_note.value = c.note || '';
      cli_info.textContent = 'ID cliente: ' + c.id_cliente;

      // evidenzia riga
      Array.from(tbodyClienti.querySelectorAll('tr')).forEach(tr => {
        tr.classList.toggle('selected', tr.dataset.id === id);
      });

      // collega form contratto
      ctr_id_cliente.value = c.id_cliente || '';
      if (!ctr_codice_fiscale.value) {
        ctr_codice_fiscale.value = c.codice_fiscale || '';
      }

      loadContratti(c.id_cliente);
    }

    function clearContrattoForm() {
      selectedContrattoId = null;
      ctr_id_contratto.value = '';
      // ctr_id_cliente NON si svuota, resta il cliente selezionato
      ctr_data_contratto.value = '';
      ctr_codice_fiscale.value = '';
      ctr_tipo_cliente.value = '';
      ctr_tipo_attivazione.value = '';
      ctr_tecnologia.value = '';
      ctr_convergenza.value = '';
      ctr_mnp.value = '';
      ctr_data_attivazione.value = '';
      ctr_data_portabilita.value = '';
      ctr_numero_lavorato.value = '';
      ctr_nome_offerta.value = '';
      ctr_costo_offerta.value = '';
      ctr_vincolo_offerta_mesi.value = '';
      ctr_telefono_incluso.value = '';
      ctr_imei.value = '';
      ctr_modello.value = '';
      ctr_tipo_pagamento.value = '';
      ctr_mesi_vincolo_telefono.value = '';
      ctr_data_fine_vincolo_offerta.value = '';
      ctr_data_fine_vincolo_telefono.value = '';
      ctr_info.textContent = '';
      Array.from(tbodyContratti.querySelectorAll('tr')).forEach(tr => tr.classList.remove('selected'));
    }

    function selectContratto(idContratto) {
      const c = contratti.find(x => x.id_contratto === idContratto);
      if (!c) return;
      selectedContrattoId = idContratto;

      ctr_id_contratto.value = c.id_contratto || '';
      ctr_id_cliente.value = c.id_cliente || '';
      ctr_codice_fiscale.value = c.codice_fiscale || '';
      ctr_data_contratto.value = c.data_contratto || '';
      ctr_tipo_cliente.value = c.tipo_cliente || '';
      ctr_tipo_attivazione.value = c.tipo_attivazione || '';
      ctr_tecnologia.value = c.tecnologia || '';
      ctr_convergenza.value = c.convergenza || '';
      ctr_mnp.value = c.mnp || '';
      ctr_data_attivazione.value = c.data_attivazione || '';
      ctr_data_portabilita.value = c.data_portabilita || '';
      ctr_numero_lavorato.value = c.numero_lavorato || '';
      ctr_nome_offerta.value = c.nome_offerta || '';
      ctr_costo_offerta.value = c.costo_offerta || '';
      ctr_vincolo_offerta_mesi.value = c.vincolo_offerta_mesi || '';
      ctr_telefono_incluso.value = c.telefono_incluso || '';
      ctr_imei.value = c.imei || '';
      ctr_modello.value = c.modello || '';
      ctr_tipo_pagamento.value = c.tipo_pagamento || '';
      ctr_mesi_vincolo_telefono.value = c.mesi_vincolo_telefono || '';
      ctr_data_fine_vincolo_offerta.value = c.data_fine_vincolo_offerta || '';
      ctr_data_fine_vincolo_telefono.value = c.data_fine_vincolo_telefono || '';
      ctr_info.textContent = 'ID contratto: ' + c.id_contratto;

      Array.from(tbodyContratti.querySelectorAll('tr')).forEach(tr => {
        tr.classList.toggle('selected', tr.dataset.id === idContratto);
      });
    }

    // ---------- SALVATAGGIO CLIENTE ----------

    async function saveCliente(evt) {
      evt.preventDefault();

      const payload = {
        id_cliente: cli_id_cliente.value || null,
        nome: cli_nome.value.trim(),
        cognome: cli_cognome.value.trim(),
        telefono: cli_telefono.value.trim(),
        email: cli_email.value.trim(),
        codice_fiscale: cli_codice_fiscale.value.trim(),
        data_nascita: cli_data_nascita.value,
        note: cli_note.value.trim()
      };

      if (!payload.nome || !payload.cognome) {
        alert('Nome e cognome sono obbligatori');
        return;
      }

      const isNew = !payload.id_cliente;
      const action = isNew ? 'createCliente' : 'updateCliente';

      setStatus((isNew ? 'Creazione cliente...' : 'Aggiornamento cliente...'));

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, ...payload })
        });
        const data = await res.json();
        if (!data.success) {
          setStatus('Errore: ' + (data.error || 'Errore sconosciuto'));
          return;
        }
        await loadClienti();

        if (isNew) {
          selectedClienteId = data.id_cliente;
          cli_id_cliente.value = data.id_cliente;
          cli_info.textContent = 'ID cliente: ' + data.id_cliente;
          setStatus('Cliente creato');
        } else {
          selectedClienteId = payload.id_cliente;
          setStatus('Cliente aggiornato');
        }
        selectCliente(selectedClienteId);
      } catch (err) {
        console.error(err);
        setStatus('Errore di rete durante il salvataggio cliente');
      }
    }

    async function deleteCliente() {
      if (!cli_id_cliente.value) {
        alert('Seleziona prima un cliente');
        return;
      }
      if (!confirm('Sei sicuro di voler eliminare questo cliente e i suoi contratti?')) {
        return;
      }

      setStatus('Eliminazione cliente in corso...');

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'deleteCliente',
            id_cliente: cli_id_cliente.value
          })
        });
        const data = await res.json();
        if (!data.success) {
          setStatus('Errore: ' + (data.error || 'Errore sconosciuto'));
          return;
        }
        clearClienteForm();
        await loadClienti();
        setStatus('Cliente eliminato');
      } catch (err) {
        console.error(err);
        setStatus('Errore di rete durante l\'eliminazione cliente');
      }
    }

    // ---------- SALVATAGGIO CONTRATTO ----------

    async function saveContratto(evt) {
      evt.preventDefault();

      if (!ctr_id_cliente.value) {
        alert('Prima seleziona un cliente');
        return;
      }

      const payload = {
        id_contratto: ctr_id_contratto.value || null,
        id_cliente: ctr_id_cliente.value,
        codice_fiscale: ctr_codice_fiscale.value.trim(),
        data_contratto: ctr_data_contratto.value,
        tipo_cliente: ctr_tipo_cliente.value,
        tipo_attivazione: ctr_tipo_attivazione.value.trim(),
        tecnologia: ctr_tecnologia.value.trim(),
        convergenza: ctr_convergenza.value,
        mnp: ctr_mnp.value,
        data_attivazione: ctr_data_attivazione.value,
        data_portabilita: ctr_data_portabilita.value,
        numero_lavorato: ctr_numero_lavorato.value.trim(),
        nome_offerta: ctr_nome_offerta.value.trim(),
        costo_offerta: ctr_costo_offerta.value,
        vincolo_offerta_mesi: ctr_vincolo_offerta_mesi.value,
        telefono_incluso: ctr_telefono_incluso.value,
        imei: ctr_imei.value.trim(),
        modello: ctr_modello.value.trim(),
        tipo_pagamento: ctr_tipo_pagamento.value.trim(),
        mesi_vincolo_telefono: ctr_mesi_vincolo_telefono.value,
        data_fine_vincolo_offerta: ctr_data_fine_vincolo_offerta.value,
        data_fine_vincolo_telefono: ctr_data_fine_vincolo_telefono.value
      };

      if (!payload.nome_offerta) {
        // opzionale ma utile
        // alert('Nome offerta consigliato');
      }

      const isNew = !payload.id_contratto;
      const action = isNew ? 'createContratto' : 'updateContratto';

      setStatus((isNew ? 'Creazione contratto...' : 'Aggiornamento contratto...'));

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, ...payload })
        });
        const data = await res.json();
        if (!data.success) {
          setStatus('Errore: ' + (data.error || 'Errore sconosciuto'));
          return;
        }
        await loadContratti(ctr_id_cliente.value);

        if (isNew) {
          ctr_id_contratto.value = data.id_contratto;
          selectedContrattoId = data.id_contratto;
          ctr_info.textContent = 'ID contratto: ' + data.id_contratto;
          setStatus('Contratto creato');
        } else {
          selectedContrattoId = payload.id_contratto;
          setStatus('Contratto aggiornato');
        }
      } catch (err) {
        console.error(err);
        setStatus('Errore di rete durante il salvataggio contratto');
      }
    }

    async function deleteContratto() {
      if (!ctr_id_contratto.value) {
        alert('Seleziona prima un contratto');
        return;
      }
      if (!confirm('Sei sicuro di voler eliminare questo contratto?')) {
        return;
      }

      setStatus('Eliminazione contratto in corso...');

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'deleteContratto',
            id_contratto: ctr_id_contratto.value
          })
        });
        const data = await res.json();
        if (!data.success) {
          setStatus('Errore: ' + (data.error || 'Errore sconosciuto'));
          return;
        }
        const cliId = ctr_id_cliente.value;
        clearContrattoForm();
        await loadContratti(cliId);
        setStatus('Contratto eliminato');
      } catch (err) {
        console.error(err);
        setStatus('Errore di rete durante l\'eliminazione contratto');
      }
    }

    // ---------- EVENTI ----------

    document.addEventListener('DOMContentLoaded', () => {
      loadClienti();

      searchClientiEl.addEventListener('input', renderClienti);

      formCliente.addEventListener('submit', saveCliente);
      btnNewCliente.addEventListener('click', clearClienteForm);
      btnClearCliente.addEventListener('click', clearClienteForm);
      btnDeleteCliente.addEventListener('click', deleteCliente);

      formContratto.addEventListener('submit', saveContratto);
      btnClearContratto.addEventListener('click', clearContrattoForm);
      btnDeleteContratto.addEventListener('click', deleteContratto);
    });
  </script>
</body>
</html>
