<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Volpex CRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="volpex.css" />
  <link rel="icon" href="assets/logo.png" />
</head>

<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <img src="assets/logo.png" class="logo-small">
      <span class="crm-title">VOLPEX CRM</span>
    </div>

    <div class="topbar-center">
      <input id="globalSearch" type="text" placeholder="Cerca clienti, contratti o device..." />
    </div>

    <div class="topbar-right">
      <button class="icon-btn">🔔</button>
      <button class="icon-btn">⚙️</button>
    </div>
  </header>

  <!-- MENU SECONDARIO -->
  <nav class="menu-bar">
    <button data-page="home" class="menu-link active">Home</button>
    <button data-page="clienti" class="menu-link">Clienti</button>
    <button data-page="contratti" class="menu-link">Contratti</button>
    <button data-page="device" class="menu-link">Device</button>
    <button data-page="report" class="menu-link">Report</button>
    <button data-page="import" class="menu-link">Import</button>
  </nav>

  <main id="app" class="content"></main>

  <script src="volpex.js"></script>
</body>
</html>
